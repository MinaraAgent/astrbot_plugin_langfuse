name: astrbot_plugin_langfuse
desc: Langfuse integration plugin for AstrBot - LLM observability and tracing
version: 1.0.0
author: minaraagent
repo: https://github.com/MinaraAgent/astrbot_plugin_langfuse
license: MIT

# Plugin configuration
config:
  enabled:
    type: bool
    default: true
    description: "Enable Langfuse tracing"
  secret_key:
    type: string
    default: ""
    description: "Langfuse Secret Key"
  public_key:
    type: string
    default: ""
    description: "Langfuse Public Key"
  base_url:
    type: string
    default: "https://cloud.langfuse.com"
    description: "Langfuse API base URL"
  enabled_llm_tracing:
    type: bool
    default: true
    description: "Enable LLM call tracing"
  enabled_message_tracing:
    type: bool
    default: true
    description: "Enable message event tracing"
  session_timeout:
    type: int
    default: 3600
    description: "Session timeout in seconds"
  environment:
    type: string
    default: "production"
    description: "Environment name for traces"

# Supported AstrBot versions
astrbot_version: ">=3.4.0"
